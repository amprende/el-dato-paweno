<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalles de la Oferta - LootDeals</title>
  <meta name="description" content="Detalles de la oferta en LootDeals.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .details-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-lg);
      margin-top: var(--space-lg);
    }
    @media (min-width: 768px) {
      .details-container {
        grid-template-columns: 1fr 1fr;
      }
    }
    .image-gallery {
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      padding: var(--space-md);
      border: 1px solid var(--border-color);
    }
    .main-image {
      width: 100%;
      height: 300px;
      background-size: cover;
      background-position: center;
      border-radius: var(--radius-md);
      margin-bottom: var(--space-md);
    }
    .thumbnails {
      display: flex;
      gap: var(--space-sm);
    }
    .thumbnail {
      width: 60px;
      height: 60px;
      background-size: cover;
      background-position: center;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: 2px solid transparent;
    }
    .thumbnail.active {
      border-color: var(--primary);
    }
    .info-panel {
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      border: 1px solid var(--border-color);
    }
    .deal-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: var(--space-sm);
    }
    .deal-title {
      font-family: var(--font-headline);
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: var(--space-sm);
    }
    .price-tag {
      display: flex;
      align-items: baseline;
      gap: var(--space-md);
      margin-bottom: var(--space-md);
    }
    .current-price {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--primary);
      font-family: var(--font-headline);
    }
    .original-price {
      font-size: 1.5rem;
      text-decoration: line-through;
      color: var(--on-surface-variant);
    }
    .discount-pill {
      background: #ef4444;
      color: white;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 1rem;
    }
    .description-section {
      margin-top: var(--space-lg);
      padding-top: var(--space-lg);
      border-top: 1px solid var(--border-color);
    }
    .coupon-box {
      background: #fef08a;
      border: 2px dashed #f59e0b;
      padding: var(--space-md);
      border-radius: var(--radius-md);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-lg);
    }
    .coupon-code {
      font-family: monospace;
      font-size: 1.2rem;
      font-weight: 700;
      color: #b45309;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <img src="img/logo.png" alt="Logo" style="height: 40px; width: auto; transform: scale(1.8); transform-origin: left center; margin-right: 25px;">
        <span class="logo-text">Eldato<span style="color: var(--legendary); font-weight: 800;">paweno</span></span>
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link" id="nav-ofertas">
          <span class="material-icons">local_fire_department</span> Ofertas
        </a>
        <a href="admin.html" class="nav-link" id="nav-admin">
          <span class="material-icons">dashboard</span> Panel
        </a>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="container" style="margin-top: var(--space-xl); margin-bottom: var(--space-xl);">
    <a href="index.html" class="btn-secondary" style="margin-bottom: var(--space-md); display: inline-flex; align-items: center; gap: var(--space-xs);">
      <span class="material-icons">arrow_back</span> Volver a Ofertas
    </a>

    <div class="details-container" id="details-content">
      <!-- Content generated by JS -->
      <div style="text-align: center; grid-column: 1/-1; padding: var(--space-xl);">
        <span class="material-icons" style="font-size: 3rem; color: var(--outline);">hourglass_empty</span>
        <h3>Cargando detalles del producto...</h3>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await dealsLoadedPromise;
      
      // Get ID from URL
      const urlParams = new URLSearchParams(window.location.search);
      const dealId = urlParams.get('id');
      
      if (!dealId) {
        document.getElementById('details-content').innerHTML = `
          <div style="text-align: center; grid-column: 1/-1; padding: var(--space-xl);">
            <span class="material-icons" style="font-size: 3rem; color: var(--outline);">error</span>
            <h3>No se especificó ID de producto</h3>
          </div>
        `;
        return;
      }
      
      const deal = DEALS_DATA.find(d => d.id == dealId);
      
      if (!deal) {
        document.getElementById('details-content').innerHTML = `
          <div style="text-align: center; grid-column: 1/-1; padding: var(--space-xl);">
            <span class="material-icons" style="font-size: 3rem; color: var(--outline);">search_off</span>
            <h3>Producto no encontrado</h3>
          </div>
        `;
        return;
      }
      
      renderDealDetails(deal);
    });
    
    function renderDealDetails(deal) {
      const content = document.getElementById('details-content');
      const discount = calculateDiscountPercentage(deal.originalPrice, deal.dealPrice);
      
      content.innerHTML = `
        <!-- Left Side: Gallery -->
        <div class="image-gallery">
          <div class="main-image" style="background-image: url('${deal.imageUrl}')"></div>
          <div class="thumbnails">
            <div class="thumbnail active" style="background-image: url('${deal.imageUrl}')"></div>
            <div class="thumbnail" style="background-image: url('https://images.unsplash.com/photo-1511385348-a52b4a160dc2?w=500&auto=format')"></div>
            <div class="thumbnail" style="background-image: url('https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=500&auto=format')"></div>
          </div>
        </div>
        
        <!-- Right Side: Info -->
        <div class="info-panel">
          <span class="deal-badge ${deal.rarity}-badge">${getRarityLabel(deal.rarity)}</span>
          <span style="color: var(--on-surface-variant); margin-left: 10px;">Vendido por ${deal.store}</span>
          <h1 class="deal-title">${deal.title}</h1>
          
          <div class="price-tag">
            <span class="current-price">${formatCurrency(deal.dealPrice)}</span>
            <span class="original-price">${formatCurrency(deal.originalPrice)}</span>
            <span class="discount-pill">-${discount}%</span>
          </div>
          
          ${deal.stock ? `<p style="color: #ef4444; font-weight: 600; margin-bottom: var(--space-md);"><span class="material-icons" style="font-size: 16px; vertical-align: middle;">timer</span> ¡Solo quedan ${deal.stock} unidades!</p>` : ''}
          
          <!-- Coupon Code -->
          ${deal.coupon ? `
          <div class="coupon-box">
            <div>
              <span style="font-size: 0.8rem; color: #92400e; font-weight: 600;">CÓDIGO DE DESCUENTO</span>
              <div class="coupon-code">${deal.coupon}</div>
            </div>
            <button class="btn-primary" style="padding: 8px 12px; font-size: 0.9rem;" onclick="navigator.clipboard.writeText('${deal.coupon}').then(() => alert('¡Código copiado!'))">
              <span class="material-icons">content_copy</span> Copiar
            </button>
          </div>
          ` : ''}
          
          <a href="${deal.url}" target="_blank" rel="noopener noreferrer" class="btn-primary" style="width: 100%; justify-content: center; font-size: 1.2rem; padding: 12px;">
            <span class="material-icons">shopping_cart</span> Ir a la Tienda
          </a>
          
          <!-- Description Section -->
          <div class="description-section">
            <h3><span class="material-icons">description</span> Descripción</h3>
            <p style="color: var(--on-surface-variant); line-height: 1.6;">
              ${deal.description || 'Este producto cuenta con un descuento excepcional. No dejes pasar esta oportunidad única de adquirirlo al mejor precio del mercado.'}
            </p>
            <br>
            <h4>Características:</h4>
            <ul style="color: var(--on-surface-variant); padding-left: 20px; line-height: 1.6;">
              <li>Envío gratis con membresía premium.</li>
              <li>Garantía extendida de 2 años.</li>
              <li>Devolución sin costo durante los primeros 30 días.</li>
              <li>Soporte técnico incluido.</li>
            </ul>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
