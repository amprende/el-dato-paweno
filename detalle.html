<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eldatopaweno - Detalles de la Oferta</title>
  <meta name="description" content="Detalles de la oferta en Eldatopaweno.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="img/logo.png">
  <style>
    .details-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-lg);
      margin-top: var(--space-lg);
    }
    @media (min-width: 768px) {
      .details-container {
        grid-template-columns: 1fr 1fr;
      }
    }
    .image-gallery {
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      padding: var(--space-md);
      border: 1px solid var(--border-color);
    }
    .main-image {
      width: 100%;
      height: 300px;
      background-size: cover;
      background-position: center;
      border-radius: var(--radius-md);
      margin-bottom: var(--space-md);
    }
    .thumbnails {
      display: flex;
      gap: var(--space-sm);
    }
    .thumbnail {
      width: 60px;
      height: 60px;
      background-size: cover;
      background-position: center;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: 2px solid transparent;
    }
    .thumbnail.active {
      border-color: var(--primary);
    }
    .info-panel {
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      border: 1px solid var(--border-color);
    }
    .deal-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: var(--space-sm);
    }
    .deal-title {
      font-family: var(--font-headline);
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: var(--space-sm);
    }
    .price-tag {
      display: flex;
      align-items: baseline;
      gap: var(--space-md);
      margin-bottom: var(--space-md);
    }
    .current-price {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--primary);
      font-family: var(--font-headline);
    }
    .original-price {
      font-size: 1.5rem;
      text-decoration: line-through;
      color: var(--on-surface-variant);
    }
    .discount-pill {
      background: #ef4444;
      color: white;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 1rem;
    }
    .description-section {
      margin-top: var(--space-lg);
      padding-top: var(--space-lg);
      border-top: 1px solid var(--border-color);
    }
    .coupon-box {
      background: #fef08a;
      border: 2px dashed #f59e0b;
      padding: var(--space-md);
      border-radius: var(--radius-md);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-lg);
    }
    .coupon-code {
      font-family: monospace;
      font-size: 1.2rem;
      font-weight: 700;
      color: #b45309;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo" id="logo-btn">
        <img src="img/logo_frames/frame_1.png" alt="Logo" id="animated-logo" style="height: 80px; width: auto; margin-top: -16px; margin-bottom: -16px; margin-right: 15px;">
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link" id="nav-ofertas">
          <span class="material-icons">local_fire_department</span> Ofertas
        </a>
        <a href="admin.html" class="nav-link" id="nav-admin">
          <span class="material-icons">dashboard</span> Panel
        </a>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="container" style="margin-top: var(--space-xl); margin-bottom: var(--space-xl);">
    <a href="index.html" class="btn-secondary" style="margin-bottom: var(--space-md); display: inline-flex; align-items: center; gap: var(--space-xs);">
      <span class="material-icons">arrow_back</span> Volver a Ofertas
    </a>

    <div class="details-container" id="details-content">
      <!-- Content generated by JS -->
      <div style="text-align: center; grid-column: 1/-1; padding: var(--space-xl);">
        <span class="material-icons" style="font-size: 3rem; color: var(--outline);">hourglass_empty</span>
        <h3>Cargando detalles del producto...</h3>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/data.js"></script>
  <script src="js/logo-animado.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await dealsLoadedPromise;
      
      // Get ID from URL
      const urlParams = new URLSearchParams(window.location.search);
      const dealId = urlParams.get('id');
      
      if (!dealId) {
        document.getElementById('details-content').innerHTML = `
          <div style="text-align: center; grid-column: 1/-1; padding: var(--space-xl);">
            <span class="material-icons" style="font-size: 3rem; color: var(--outline);">error</span>
            <h3>No se especificó ID de producto</h3>
          </div>
        `;
        return;
      }
      
      const deal = DEALS_DATA.find(d => d.id == dealId);
      
      if (!deal) {
        document.getElementById('details-content').innerHTML = `
          <div style="text-align: center; grid-column: 1/-1; padding: var(--space-xl);">
            <span class="material-icons" style="font-size: 3rem; color: var(--outline);">search_off</span>
            <h3>Producto no encontrado</h3>
          </div>
        `;
        return;
      }
      
      renderDealDetails(deal);
    });
    
    function renderDealDetails(deal) {
      const content = document.getElementById('details-content');
      const discount = calculateDiscountPercentage(deal.originalPrice, deal.dealPrice);
      
      content.innerHTML = `
        <!-- Left Side: Gallery -->
        <div class="image-gallery">
          <div class="main-image" style="background-image: url('${deal.imageUrl}')"></div>
          <div class="thumbnails">
            ${deal.images && Array.isArray(deal.images) && deal.images.length > 0 ? deal.images.map((img, i) => `
              <div class="thumbnail ${i === 0 ? 'active' : ''}" style="background-image: url('${img}')" onclick="changeImage(this, '${img}')"></div>
            `).join('') : `
              <div class="thumbnail active" style="background-image: url('${deal.imageUrl}')" onclick="changeImage(this, '${deal.imageUrl}')"></div>
              <div class="thumbnail" style="background-image: url('https://images.unsplash.com/photo-1511385348-a52b4a160dc2?w=500&auto=format')" onclick="changeImage(this, 'https://images.unsplash.com/photo-1511385348-a52b4a160dc2?w=500&auto=format')"></div>
              <div class="thumbnail" style="background-image: url('https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=500&auto=format')" onclick="changeImage(this, 'https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=500&auto=format')"></div>
            `}
          </div>
        </div>
        
        <!-- Right Side: Info -->
        <div class="info-panel">
          <span class="deal-badge ${deal.rarity}-badge">${getRarityLabel(deal.rarity)}</span>
          <span style="color: var(--on-surface-variant); margin-left: 10px;">Vendido por ${deal.store}</span>
          <h1 class="deal-title">${deal.title}</h1>
          
          <div class="price-tag">
            <span class="current-price">${formatCurrency(deal.dealPrice)}</span>
            <span class="original-price">${formatCurrency(deal.originalPrice)}</span>
            <span class="discount-pill">-${discount}%</span>
          </div>
          
          ${deal.stock ? `<p style="color: #ef4444; font-weight: 600; margin-bottom: var(--space-md);"><span class="material-icons" style="font-size: 16px; vertical-align: middle;">timer</span> ¡Solo quedan ${deal.stock} unidades!</p>` : ''}
          
          <!-- Coupon Code -->
          ${deal.coupon ? `
          <div class="coupon-box">
            <div>
              <span style="font-size: 0.8rem; color: #92400e; font-weight: 600;">CÓDIGO DE DESCUENTO</span>
              <div class="coupon-code">${deal.coupon}</div>
            </div>
            <button class="btn-primary" style="padding: 8px 12px; font-size: 0.9rem;" onclick="navigator.clipboard.writeText('${deal.coupon}').then(() => alert('¡Código copiado!'))">
              <span class="material-icons">content_copy</span> Copiar
            </button>
          </div>
          ` : ''}
          
          <a href="${deal.url}" target="_blank" rel="noopener noreferrer" class="btn-primary" style="width: 100%; justify-content: center; font-size: 1.2rem; padding: 12px;">
            <span class="material-icons">shopping_cart</span> Ir a la Tienda
          </a>
          
          <div class="share-container" style="margin-top: var(--space-md);">
            <button onclick="shareTelegram('${deal.title.replace(/'/g, "\\'")}', ${deal.id})" class="btn-share btn-tg" style="padding: 12px; font-size: 1rem;" title="Compartir en Telegram">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="margin-right: 6px;"><path d="M9.78 18.65l.28-4.28 7.68-7.05c.34-.3-.07-.46-.52-.15L7.69 12.18l-4.14-1.3c-.9-.28-.92-.9.19-1.34l16.16-6.29c.75-.28 1.4.17 1.15.96l-2.75 13.14c-.2.92-.75 1.15-1.52.72l-4.2-3.1-2.03 1.98c-.23.23-.42.42-.86.42z"/></svg> Telegram
            </button>
            <button onclick="shareInstagram('${deal.title.replace(/'/g, "\\'")}', ${deal.id})" class="btn-share btn-ig" style="padding: 12px; font-size: 1rem;" title="Compartir en Instagram">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="margin-right: 6px;"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.051.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg> Instagram
            </button>
          </div>
          
          <!-- Description Section -->
          <div class="description-section">
            <h3><span class="material-icons">description</span> Descripción</h3>
            <p style="color: var(--on-surface-variant); line-height: 1.6;">
              ${deal.description || 'Este producto cuenta con un descuento excepcional. No dejes pasar esta oportunidad única de adquirirlo al mejor precio del mercado.'}
            </p>
            <br>
            <h4>Características:</h4>
            <ul style="color: var(--on-surface-variant); padding-left: 20px; line-height: 1.6;">
              <li>Envío gratis con membresía premium.</li>
              <li>Garantía extendida de 2 años.</li>
              <li>Devolución sin costo durante los primeros 30 días.</li>
              <li>Soporte técnico incluido.</li>
            </ul>
          </div>
        </div>
      `;
    }

    function changeImage(element, url) {
      document.querySelector('.main-image').style.backgroundImage = `url('${url}')`;
      document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
      element.classList.add('active');
    }
  </script>
</body>
</html>
